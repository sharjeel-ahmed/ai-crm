services:
  - type: web
    name: pazo-crm
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npx vite build
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/crm.db
